apiVersion: v1
kind: Namespace
metadata:
  name: kubehz-system
  labels:
    app.kubernetes.io/name: kubehz-agent
    app.kubernetes.io/part-of: kubehz
    # Enforce the restricted Pod Security Standard on the agent's own namespace:
    # the agent runs non-root, no privilege escalation, seccomp RuntimeDefault.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
