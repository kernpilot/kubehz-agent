apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Managed-tier live-view agent (P2). The Secret `kubehz-agent` (ns
# kubehz-system, keys agent-token/claim-code) is bootstrapped by the existing
# lok8s heartbeat plumbing (create-if-absent, never rotated) and is NOT owned by
# this kustomization — the Deployment only mounts it read-only.
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - configmap.yaml
  - deployment.yaml
