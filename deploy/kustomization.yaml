apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# REGISTERED-TIER entry point: observe + report ONLY (the read-only base,
# nothing else). `kubectl apply -k deploy/` keeps working as before the
# base/managed split. For a MANAGED cluster apply deploy/managed/ instead —
# it is the same base plus the opt-in MachineDeployment-patch RBAC (worker
# scaling, P3). See deploy/README.md for the split rationale.
resources:
  - base

# To retarget/repin the image (e.g. the public GHCR ref once the package is
# public, or a release digest), override here instead of editing
# base/deployment.yaml (works the same in deploy/managed/kustomization.yaml):
#
# images:
#   - name: docker.kubehz.in.net/kubehz-builds/kubehz-agent
#     newName: ghcr.io/kernpilot/kubehz-agent
#     digest: sha256:<release digest>
