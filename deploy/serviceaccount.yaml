# Named kubehz-live-agent (NOT kubehz-agent): the bash heartbeat CronJob owns
# the kubehz-agent SA/RBAC names, and the two agents coexist — see rbac.yaml.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubehz-live-agent
  namespace: kubehz-system
  labels:
    app.kubernetes.io/name: kubehz-live-agent
    app.kubernetes.io/part-of: kubehz
