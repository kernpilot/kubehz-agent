# Managed-tier least-privilege RBAC for the live-view agent.
#
# NAMING — every object here is kubehz-live-agent*, NOT kubehz-agent*. The
# registered-tier bash heartbeat CronJob (deployed by lok8s) owns the
# kubehz-agent-named SA/ClusterRole/ClusterRoleBinding/Roles with DIFFERENT
# rules (componentstatuses, namespaces, CSRs, /readyz, /version, kube-system pod
# list, Secret create). Reusing those names would clobber its RBAC and break its
# component-health heartbeat. The two agents coexist; the ONLY shared objects
# are the kubehz-system Namespace and the kubehz-agent Secret (identity), which
# this kustomization never writes. See deploy/README.md.
#
# The agent runs SharedInformers on nodes/pods/events, which require CLUSTER-WIDE
# list/watch on those three resources. That is the entire blast radius: read-only
# on nodes/pods/events, plus a get on ITS OWN token Secret (scoped by name). No
# writes anywhere; no logs/exec/secret-reads beyond the one agent Secret — those
# are deliberately absent so the pod cannot read workload contents or credentials.
#
# THIS FILE STAYS READ-ONLY. The managed-tier ACTING permission (patch on
# machinedeployments.cluster.k8s.io, for P3 worker scaling) is deliberately NOT
# here — it lives in the opt-in overlay deploy/managed/rbac-managed.yaml so a
# registered-tier apply never grants an unused write.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubehz-live-agent
  labels:
    app.kubernetes.io/name: kubehz-live-agent
    app.kubernetes.io/part-of: kubehz
rules:
  # Live view: node inventory/roles/version/capacity, pod-phase summary, and
  # recent Warning events. get/list/watch only — the informers need list+watch;
  # get rounds out the read verb set. NO create/update/patch/delete.
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - events
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubehz-live-agent
  labels:
    app.kubernetes.io/name: kubehz-live-agent
    app.kubernetes.io/part-of: kubehz
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubehz-live-agent
subjects:
  - kind: ServiceAccount
    name: kubehz-live-agent
    namespace: kubehz-system
---
# Token Secret read — the FALLBACK path only. The Deployment mounts the Secret as
# a read-only file (the default, needing NO RBAC), so this Role is dormant unless
# an operator disables the mount and relies on the k8s-API read. It is scoped to
# the single kubehz-agent Secret by resourceNames and grants ONLY get — the agent
# can never read any other Secret, and never create/update/delete this one (the
# never-rotate invariant: the bash CronJob owns bootstrap; the Go agent consumes).
# NOTE: resourceNames stays `kubehz-agent` — that is the SHARED identity Secret's
# name, not this agent's resource prefix.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubehz-live-agent-secret
  namespace: kubehz-system
  labels:
    app.kubernetes.io/name: kubehz-live-agent
    app.kubernetes.io/part-of: kubehz
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [kubehz-agent]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubehz-live-agent-secret
  namespace: kubehz-system
  labels:
    app.kubernetes.io/name: kubehz-live-agent
    app.kubernetes.io/part-of: kubehz
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubehz-live-agent-secret
subjects:
  - kind: ServiceAccount
    name: kubehz-live-agent
    namespace: kubehz-system
