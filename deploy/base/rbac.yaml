# Managed-tier least-privilege RBAC for the live-view agent.
#
# NAMING — every object here is kubehz-live-agent*, NOT kubehz-agent*. The
# registered-tier bash heartbeat CronJob (deployed by lok8s) owns the
# kubehz-agent-named SA/ClusterRole/ClusterRoleBinding/Roles with DIFFERENT
# rules (componentstatuses, namespaces, CSRs, /readyz, /version, kube-system pod
# list, Secret create). Reusing those names would clobber its RBAC and break its
# component-health heartbeat. The two agents coexist; the ONLY shared objects
# are the kubehz-system Namespace and the kubehz-agent Secret (identity), which
# this kustomization never writes. See deploy/README.md.
#
# The agent runs SharedInformers on nodes/pods/events, which require CLUSTER-WIDE
# list/watch on those three resources. That is the blast radius: read-only on
# nodes/pods/events plus the lok8s ClusterInventory (below), a get on ITS OWN
# token Secret (scoped by name), and ONE narrowly-scoped write — the
# ClusterInventory STATUS patch, a visibility feature explained at the rule. No
# other writes; no logs/exec/secret-reads beyond the one agent Secret — those
# are deliberately absent so the pod cannot read workload contents or credentials.
#
# THIS FILE STAYS FREE OF ACTING PERMISSIONS. The managed-tier ACTING grants
# (patch on machinedeployments.cluster.k8s.io, machine delete, …) are
# deliberately NOT here — they live in the opt-in overlay
# deploy/managed/rbac-managed.yaml so a registered-tier apply never grants an
# unused infrastructure write. The one write below is NOT acting: it touches
# only the status of the cluster's own reporting object and can move no
# machine, pod, or credential.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubehz-live-agent
  labels:
    app.kubernetes.io/name: kubehz-live-agent
    app.kubernetes.io/part-of: kubehz
rules:
  # Live view: node inventory/roles/version/capacity, pod-phase summary, and
  # recent Warning events. get/list/watch only — the informers need list+watch;
  # get rounds out the read verb set. NO create/update/patch/delete.
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - events
    verbs: [get, list, watch]
  # ClusterInventory (lok8s.dev, cluster-scoped singleton "cluster"): the
  # deployment inventory the USER'S OWN `lo` CLI wrote into their own cluster
  # (versions/addon names/categories/spec hash — the CRD schema prunes
  # anything else). The agent reads its spec into the heartbeat's inventory
  # block so the platform can compute addon updates. Registered-tier-safe:
  # pure metadata the user's tooling already published cluster-locally.
  - apiGroups: [lok8s.dev]
    resources: [clusterinventories]
    verbs: [get, list, watch]
  # ClusterInventory STATUS patch — a VISIBILITY feature, not an acting
  # permission, which is why it belongs in the base and not the managed
  # overlay: the agent writes the server-computed availableUpdates (+
  # lastReported) back onto the cluster's OWN reporting object, so
  # `kubectl get clusterinventory cluster -o yaml` shows addon updates even
  # for registered-tier users who never open the dashboard. It acts on no
  # infrastructure: the status subresource of this one CR is dashboard-class
  # data living in the user's cluster — nothing reconciles it, no machine,
  # pod, or credential can be moved through it. Spec stays lo-owned (patch on
  # the status SUBRESOURCE cannot write spec). Drop this rule and only the
  # kubectl-visible mirror is lost (the agent warns once and keeps beating).
  - apiGroups: [lok8s.dev]
    resources: [clusterinventories/status]
    verbs: [patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubehz-live-agent
  labels:
    app.kubernetes.io/name: kubehz-live-agent
    app.kubernetes.io/part-of: kubehz
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubehz-live-agent
subjects:
  - kind: ServiceAccount
    name: kubehz-live-agent
    namespace: kubehz-system
---
# Token Secret read — the FALLBACK path only. The Deployment mounts the Secret as
# a read-only file (the default, needing NO RBAC), so this Role is dormant unless
# an operator disables the mount and relies on the k8s-API read. It is scoped to
# the single kubehz-agent Secret by resourceNames and grants ONLY get — the agent
# can never read any other Secret, and never create/update/delete this one (the
# never-rotate invariant: the bash CronJob owns bootstrap; the Go agent consumes).
# NOTE: resourceNames stays `kubehz-agent` — that is the SHARED identity Secret's
# name, not this agent's resource prefix.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubehz-live-agent-secret
  namespace: kubehz-system
  labels:
    app.kubernetes.io/name: kubehz-live-agent
    app.kubernetes.io/part-of: kubehz
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [kubehz-agent]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubehz-live-agent-secret
  namespace: kubehz-system
  labels:
    app.kubernetes.io/name: kubehz-live-agent
    app.kubernetes.io/part-of: kubehz
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubehz-live-agent-secret
subjects:
  - kind: ServiceAccount
    name: kubehz-live-agent
    namespace: kubehz-system
