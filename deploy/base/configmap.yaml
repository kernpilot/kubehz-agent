# Named kubehz-live-agent-config (NOT kubehz-agent-config): the bash heartbeat
# CronJob owns kubehz-agent-config, and applying this file over it would clobber
# the substituted values feeding the live CronJob. Same placeholder tokens, so
# the same lok8s substitution plumbing can feed both agents.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubehz-live-agent-config
  namespace: kubehz-system
  labels:
    app.kubernetes.io/name: kubehz-live-agent
    app.kubernetes.io/part-of: kubehz
data:
  # Substituted at deploy time by lok8s (libs/kubehz/deploy) — same tokens the
  # bash CronJob agent uses, so one plumbing feeds both agents.
  KUBEHZ_API_URL: "KUBEHZ_API_URL_PLACEHOLDER"
  CLUSTER_ID: "CLUSTER_ID_PLACEHOLDER"
  # Read bearer A from the mounted Secret file (least privilege — no Secret GET
  # RBAC needed). The agent falls back to the k8s API only if this file is absent.
  KUBEHZ_AGENT_TOKEN_FILE: "/var/run/secrets/kubehz/agent-token"
  # Privacy: keep per-namespace pod counts and event namespaces/messages OUT of
  # the payload by default (spec §1.2.5). Set to "true" to opt in.
  KUBEHZ_REPORT_NAMESPACES: "false"
  # ── P3 desired-state loop (worker scaling) ─────────────────────────────────
  # NOTE: none of these ENABLE acting. Execution is authorized exclusively by
  # the server's /desired execution{} flags (tier × access × kill switch) plus
  # the opt-in RBAC overlay (deploy/managed) — these are only guard-rails.
  # Pull cadence in whole seconds (integer; + up to 10% jitter).
  KUBEHZ_DESIRED_POLL_SECONDS: "60"
  # Where machine-controller serves MachineDeployments (KubeOne default). If
  # you change it, move deploy/managed/rbac-managed.yaml's Role accordingly.
  KUBEHZ_MD_NAMESPACE: "kube-system"
  # Per-pool replica CEILING: a desiredReplicas outside 0..this is REFUSED and
  # reported failed — never rewritten to the bound and applied.
  KUBEHZ_MAX_REPLICAS: "50"
  # P5 eviction unwedge: a HEAL-DELETED machine still deleting after this many
  # seconds, with its node still unreachable, gets the pods stuck Terminating
  # on that node force-deleted ONCE so eviction can complete (otherwise the
  # dead server sits in deletion indefinitely, billing the user). Minimum 60.
  # Needs the pods-delete ClusterRole from deploy/managed — without it the
  # unwedge fails soft (loud warning + reported detail) and healing keeps
  # working.
  KUBEHZ_HEAL_EVICTION_TIMEOUT_SECONDS: "300"
