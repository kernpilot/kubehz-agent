apiVersion: v1
kind: ConfigMap
metadata:
  name: kubehz-agent-config
  namespace: kubehz-system
  labels:
    app.kubernetes.io/name: kubehz-agent
    app.kubernetes.io/part-of: kubehz
data:
  # Substituted at deploy time by lok8s (libs/kubehz/deploy) — same tokens the
  # bash CronJob agent uses, so one plumbing feeds both agents.
  KUBEHZ_API_URL: "KUBEHZ_API_URL_PLACEHOLDER"
  CLUSTER_ID: "CLUSTER_ID_PLACEHOLDER"
  # Read bearer A from the mounted Secret file (least privilege — no Secret GET
  # RBAC needed). The agent falls back to the k8s API only if this file is absent.
  KUBEHZ_AGENT_TOKEN_FILE: "/var/run/secrets/kubehz/agent-token"
  # Privacy: keep per-namespace pod counts and event namespaces/messages OUT of
  # the payload by default (spec §1.2.5). Set to "true" to opt in.
  KUBEHZ_REPORT_NAMESPACES: "false"
